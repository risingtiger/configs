unbind C-b
set -g prefix C-k
bind C-k send-prefix

set -g mouse on
set -g status off
set -sg escape-time 0
set -g base-index 1
set -s escape-time 0
set -g set-titles on
set -g default-terminal "screen-256color"
# tell Tmux that outside terminal supports true color
set -ga terminal-overrides ",xterm-256color*:Tc"

bind b new-session
bind n new-window
bind m split-window -h
bind , split-window
bind o choose-session
bind u choose-window
bind h next-window
bind g previous-window
bind z kill-session
bind x kill-window
bind c kill-pane
bind q detach-client

bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

bind h select-pane -L
bind k select-pane -D
bind j select-pane -U
bind l select-pane -R

bind s resize-pane -L 10
bind f resize-pane -R 10
bind e resize-pane -U 10
bind d resize-pane -D 10

run-shell ~/.tmuxresurrect/resurrect.tmux
